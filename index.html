<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💱Conversor & Transferência</title>
<link rel="stylesheet" href="estilos.css"/>
</head>
<body>

<div class="container">
    <h2>💱 Conversor de Moedas</h2>
    <label>Valor</label>
    <input type="number" id="valor" placeholder="Digite o valor">

    <label>De</label>
    <select id="moedaDe">
        <option value="BRL">Real (BRL)</option>
        <option value="USD">Dólar (USD)</option>
        <option value="EUR">Euro (EUR)</option>
    </select>

    <label>Para</label>
    <select id="moedaPara">
        <option value="USD">Dólar (USD)</option>
        <option value="BRL">Real (BRL)</option>
        <option value="EUR">Euro (EUR)</option>
    </select>

    <button onclick="converter()">Converter</button>
    <div id="resultado" class="resultado"></div>
</div>

<div class="container" style="margin-top:20px;">
    <h2>💸 Transferência de Saldo</h2>
    <label>Conta de destino</label>
    <input type="text" id="contaDestino" placeholder="Ex: 12345-6">

    <label>Valor a transferir</label>
    <input type="number" id="valorTransferencia" placeholder="Digite o valor">

    <button onclick="transferir()">Transferir</button>
    <div id="mensagemTransferencia" class="resultado"></div>
</div>

 <script src="logicas.js"></script>

</body>
</html>
